<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RunCPM (wasm) - CP/M 2.2 in the browser</title>
<style>
  html, body { margin:0; background:#111; color:#c8c8c8; height:100%;
               font:14px/1.2 ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  #wrap { display:flex; flex-direction:column; align-items:center; padding:10px; }
  #term { white-space:pre; background:#000; color:#33ff66; padding:10px;
          width:80ch; height:25em; overflow:hidden; border:1px solid #333;
          outline:none; }
  #hint { color:#777; font-size:12px; margin-top:6px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="term" tabindex="0"></div>
  <div id="hint">click the screen, then type. RunCPM CP/M 2.2 (MIT, internal CCP).</div>
</div>
<script>
// ---- glass-TTY: a fixed 80x25 char grid driven by CP/M console bytes ----
const COLS = 80, ROWS = 25;
const termEl = document.getElementById('term');
let grid, curR, curC;
function clearScreen() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(' '));
  curR = 0; curC = 0;
  render();
}
function scroll() { grid.shift(); grid.push(Array(COLS).fill(' ')); curR = ROWS - 1; }
function putByte(ch) {
  if (ch === 0x0C) { clearScreen(); return; }        // form feed
  if (ch === 0x0A) { curR++; if (curR >= ROWS) scroll(); render(); return; } // LF
  if (ch === 0x0D) { curC = 0; return; }              // CR
  if (ch === 0x08) { if (curC > 0) curC--; render(); return; } // BS
  if (ch === 0x07) return;                             // bell
  if (ch < 32) return;                                 // ignore other ctrl
  grid[curR][curC] = String.fromCharCode(ch);
  curC++;
  if (curC >= COLS) { curC = 0; curR++; if (curR >= ROWS) scroll(); }
  render();
}
function render() {
  // draw cursor as an underscore-ish block by swapping the char under it
  const rows = grid.map((row, r) => {
    if (r === curR) {
      const line = row.slice();
      line[curC] = line[curC] === ' ' ? '█' : line[curC];
      return line.join('');
    }
    return row.join('');
  });
  termEl.textContent = rows.join('\n');
}

// ---- keyboard -> CP/M input queue ----
const inQueue = [];
termEl.addEventListener('keydown', (e) => {
  let c = null;
  if (e.key === 'Enter') c = 0x0D;
  else if (e.key === 'Backspace') c = 0x08;
  else if (e.key === 'Tab') c = 0x09;
  else if (e.key === 'Escape') c = 0x1B;
  else if (e.ctrlKey && e.key.length === 1) c = e.key.toUpperCase().charCodeAt(0) & 0x1F; // ^C etc
  else if (e.key.length === 1) c = e.key.charCodeAt(0);
  if (c !== null) { e.preventDefault(); inQueue.push(c); }
});

// ---- bridge the C abstraction (abstraction_emscripten.h EM_JS) expects ----
globalThis.CPM = {
  putch: (ch) => putByte(ch & 0xFF),
  getch: () => (inQueue.length ? inQueue.shift() : -1),
  kbhit: () => (inQueue.length ? 1 : 0),
  clrscr: () => clearScreen(),
};

clearScreen();

// ---- default disk: files preloaded onto drive A user 0 (see web/disk/) ----
const DISK = ['README.TXT', 'HELLO.COM', 'GREET.COM', 'ROGUE.COM'];

// ---- boot RunCPM ----
import('./runcpm.js').then(async ({ default: createRunCPM }) => {
  const Module = await createRunCPM();
  // Drives live under the MEMFS cwd as A/0/... (FILEBASE "./").
  try { Module.FS.mkdir('/A'); } catch (e) {}
  try { Module.FS.mkdir('/A/0'); } catch (e) {}
  for (const name of DISK) {
    const buf = new Uint8Array(await (await fetch('disk/' + name)).arrayBuffer());
    Module.FS.writeFile('/A/0/' + name, buf);
  }
  termEl.focus();
  Module.callMain([]);   // runs the CP/M CCP loop; _getch yields via ASYNCIFY
}).catch(e => { termEl.textContent = 'boot error: ' + e; console.error(e); });
</script>
</body>
</html>
